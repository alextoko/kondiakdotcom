<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KONDIAKDOTCOM</title>

<link rel="stylesheet" href="index.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="app">

    <div class="header">

        <div class="logo">
            <div class="menu">☰</div>
            <h1>KONDIAK<span>DOTCOM</span></h1>
        </div>

        <div class="header-right">

            <div class="info-box live-box">
                <div class="live">
                    <div class="live-dot"></div>
                    LIVE
                </div>
            </div>

            <div class="info-box">
                <div class="info-title">ROOM</div>
                <div id="roomId" class="info-value">#2451</div>
            </div>

            <div class="info-box">
                <div class="info-title">VIEWERS</div>
                <div id="viewerCount" class="info-value">0</div>
            </div>

        </div>

    </div>

    <div class="video-grid">

    <div class="monitor-card">

        <div class="program-overlay">
            🟢 PREVIEW
        </div>

        <video
            id="previewPlayer"
            autoplay
            muted
            playsinline>
        </video>

        <div class="preview-controls">

            <button id="previewBack">
                ⏪ 10s
            </button>

            <button id="previewPlay">
                ▶
            </button>

            <button id="previewPause">
                ⏸
            </button>

            <button id="previewStop">
                ⏹
            </button>

            <button id="previewForward">
                ⏩ 10s
            </button>

        </div>

    </div>

    <div class="take-container">

        <button
            id="takeBtn"
            class="take-btn">
            TAKE →
        </button>

    </div>

    <div class="monitor-card live-monitor">

            <div class="program-overlay">
                🔴 PROGRAM OUTPUT
            </div>

            <video
                id="programPlayer"
                autoplay
                muted
                playsinline>
            </video>

            <div class="live-controls">

                <button id="liveBack">
                    ⏪ 10s
                </button>

                <button id="livePlay">
                    ▶
                </button>

                <button id="livePause">
                    ⏸
                </button>

                <button id="liveStop">
                    ⏹
                </button>

                <button id="liveForward">
                    ⏩ 10s
                </button>

            </div>

        </div>

    </div>

    <div class="bottom">

        <div class="card">

            <div class="url-box">

                <input
                    id="inputUrl"
                    type="text"
                    placeholder="Paste M3U8 URL lalu tekan Enter">

            </div>

            <div class="section-title">
                🎬 INPUT SOURCES
            </div>

            <div class="inputs">

                <div class="input-card active" data-input="0">
                    <div class="thumb">
                        <span class="preview-tag">INPUT 1</span>
                        <img id="preview1" src="https://picsum.photos/400/250?1">
                    </div>
                    <div class="input-name">Input 1</div>
                    <div class="status">🔴 ON AIR</div>
                </div>

                <div class="input-card" data-input="1">
                    <div class="thumb">
                        <span class="preview-tag">INPUT 2</span>
                        <img id="preview2" src="https://picsum.photos/400/250?2">
                    </div>
                    <div class="input-name">Input 2</div>
                    <div class="status">Ready</div>
                </div>

                <div class="input-card" data-input="2">
                    <div class="thumb">
                        <span class="preview-tag">INPUT 3</span>
                        <img id="preview3" src="https://picsum.photos/400/250?3">
                    </div>
                    <div class="input-name">Input 3</div>
                    <div class="status">Trailer</div>
                </div>

                <div class="input-card" data-input="3">
                    <div class="thumb">
                        <span class="preview-tag">INPUT 4</span>
                        <img id="preview4" src="https://picsum.photos/400/250?4">
                    </div>
                    <div class="input-name">Input 4</div>
                    <div class="status">Ads</div>
                </div>

            </div>

        </div>

        <div class="card">

            <div class="section-title">
                👥 ROOM INFO
            </div>

            <div class="room-table">

                <div class="row">
                    <span class="label">Broadcast</span>
                    <span id="broadcastStatus" class="value red">
                        OFF AIR
                    </span>
                </div>

                <div class="row">
                    <span class="label">Current Input</span>
                    <span id="currentInput" class="value">
                        Input 1
                    </span>
                </div>

                <div class="row">
                    <span class="label">Room</span>
                    <span class="value">#2451</span>
                </div>

                <div class="row">
                    <span class="label">Host</span>
                    <span class="value green">Connected</span>
                </div>

                <div class="row">
                    <span class="label">Sync</span>
                    <span class="value green">Active</span>
                </div>

            </div>

        </div>

    </div>

    <div class="controls">

    <button id="onAirBtn" class="btn btn-air">
        🔴 ON AIR
    </button>

    <button id="fullscreenBtn" class="btn">
        ⛶ FULLSCREEN
    </button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script type="module" src="index.js"></script>
<script type="module" src="host.js"></script>

</body>
</html>
