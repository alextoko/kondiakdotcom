<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VIEWER</title>

<link rel="stylesheet" href="watch.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

<div class="app">

    <header class="topbar">

        <div class="brand">
            KONDIAK<span>DOTCOM</span>
        </div>

        <div class="top-right">

            <div class="live-badge">
                <span class="dot"></span>
                LIVE
            </div>

            <div class="info-box">
                ROOM
                <strong id="roomId">#2451</strong>
            </div>

            <div class="info-box">
                VIEWERS
                <strong id="viewerCount">0</strong>
            </div>

        </div>

    </header>

    <main class="player-area">

    <div class="video-frame">
        <video
            id="watchPlayer"
            autoplay
            playsinline
            controlslist="nodownload nofullscreen noremoteplayback"
            disablepictureinpicture>
        </video>
    </div>

        <div class="video-overlay">

            <div class="overlay-left">

                <div class="live-pill">
                    🔴 LIVE NOW
                </div>

            </div>

            <div class="overlay-right">

                <button
                    id="fullscreenBtn"
                    class="fullscreen-btn">

                    ⛶ FULLSCREEN

                </button>

            </div>

        </div>

        <div
        id="offlineScreen"
        class="offline-screen hidden">

            <div class="offline-card">

                <h2>
                    📺 OFF AIR
                </h2>

                <p>
                    Host belum menayangkan siaran.
                </p>

                <span>
                    Menunggu broadcast dimulai...
                </span>

            </div>

        </div>

    </main>

</div>

<script type="module" src="watch.js"></script>

</body>
</html>
