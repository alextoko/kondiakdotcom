<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>KONDIAKDOTCOM LIVE</title>

<link rel="stylesheet" href="watch.css">

</head>
<body>

<div class="watch-app">

    <div class="video-container">

        <div id="offlineScreen" class="offline-screen">

            <div class="offline-card">

                <h1>🔴 BROADCAST OFFLINE</h1>

                <p>
                    Host belum memulai siaran
                </p>

            </div>

        </div>

        <video
            id="watchPlayer"
            autoplay
            playsinline>
        </video>

        <!-- TOP LEFT -->
        <div class="overlay top-left">

            <div class="brand">
                KONDIAK<span>DOTCOM</span>
            </div>

            <div class="live-pill">
                🔴 LIVE
            </div>

            <div class="room-box">
                ROOM <span id="roomId">#2451</span>
            </div>

        </div>

        <!-- TOP RIGHT -->
        <div class="overlay top-right">

            <div class="viewer-box">
                👥
                <span id="viewerCount">0</span>
                Watching
            </div>

        </div>

        <!-- BOTTOM LEFT -->
        <div class="overlay bottom-left">

            <div class="status-row">

                <span class="status-label">
                    HOST
                </span>

                <span
                    id="hostStatus"
                    class="online">

                    Connected

                </span>

            </div>

            <div class="status-row">

                <span class="status-label">
                    SYNC
                </span>

                <span
                    id="syncStatus"
                    class="online">

                    Active

                </span>

            </div>

        </div>

        <!-- BOTTOM RIGHT -->
        <div class="overlay bottom-right">

            <button id="fullscreenBtn">

                ⛶ Fullscreen

            </button>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script type="module" src="watch.js"></script>

</body>
</html>
