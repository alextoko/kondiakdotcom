<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Watch Room</title>

<link rel="stylesheet" href="watch.css">

</head>
<body>

<div class="watch-app">

    <div class="topbar">

        <div class="logo">
            KONDIAK<span>DOTCOM</span>
        </div>

        <div class="top-right">

            <div class="live-badge">
                🔴 LIVE
            </div>

            <div class="viewer-box">
                👥
                <span id="viewerCount">
                    0
                </span>
            </div>

        </div>

    </div>

    <div class="video-container">

        <video
            id="watchPlayer"
            autoplay
            playsinline>
        </video>

        <div class="overlay-info">

            <div class="room-info">

                Room
                <span id="roomId">
                    #2451
                </span>

            </div>

        </div>

    </div>

    <div class="bottom-bar">

        <div>
            Host:
            <span id="hostStatus" class="online">
                Connected
            </span>
        </div>

        <div>
            Sync:
            <span id="syncStatus" class="online">
                Active
            </span>
        </div>

        <button id="fullscreenBtn">
            ⛶ Fullscreen
        </button>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script type="module" src="watch.js"></script>

</body>
</html>
